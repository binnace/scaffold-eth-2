<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bharat Swap</title>
    <style>
        body { background: #f4f4f4; font-family: Arial, sans-serif; text-align: center; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); display: inline-block; border-top: 10px solid #FF9933; border-bottom: 10px solid #138808; max-width: 400px; width: 90%; }
        h1 { color: #FF9933; margin-bottom: 5px; font-size: 28px; }
        h2 { color: #138808; margin-top: 0; font-size: 20px; }
        .btn { background: #000080; color: white; padding: 15px 30px; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; margin-top: 20px; width: 100%; }
        .address { font-size: 11px; color: #666; background: #eee; padding: 10px; border-radius: 5px; margin-top: 20px; word-break: break-all; text-align: left; }
    </style>
</head>
<body>
    <div class="card">
        <h1>BHARAT SWAP</h1>
        <h2>Official BUSD Exchange</h2>
        <p>Swap your tokens on Arbitrum Network</p>
        <div class="address">
            <strong>BUSD Contract:</strong><br>
            0x25d34817D4205fE605b4C65Ed3Be83C85107d333
        </div>
        <button class="btn" onclick="alert('Connecting to Arbitrum...')">Connect Wallet</button>
    </div>
</body>
</html>
